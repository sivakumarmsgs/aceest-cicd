name: ACEest CI/CD Pipeline

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint & Build ────────────────────────────────────────────────────
  lint-and-build:
    name: "Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8 (syntax errors & style)
        run: |
          # Stop the build on syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings (won't fail build)
          flake8 app.py --count --max-line-length=100 --exit-zero --statistics

      - name: Verify application imports cleanly
        run: python -c "from app import app; print('Import OK')"

  # ── Job 2: Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    name: "Automated Testing (Pytest)"
    runs-on: ubuntu-latest
    needs: lint-and-build   # Only run if lint passes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest with coverage
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ── Job 3: Docker Build ────────────────────────────────────────────────────
  docker-build:
    name: "Docker Image Assembly"
    runs-on: ubuntu-latest
    needs: unit-tests   # Only build image after tests pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # No registry push for now; just verify build
          tags: aceest-fitness:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Pytest inside the container
        run: |
          docker build -t aceest-fitness:test .
          docker run --rm \
            -v ${{ github.workspace }}/tests:/app/tests \
            -v ${{ github.workspace }}/conftest.py:/app/conftest.py \
            -v ${{ github.workspace }}/requirements.txt:/app/requirements.txt \
            --entrypoint "" \
            aceest-fitness:test \
            sh -c "pip install pytest pytest-cov --quiet && cd /app && pytest tests/ -v --tb=short"

      - name: Smoke-test the running container
        run: |
          docker run -d --name aceest_smoke -p 5000:5000 aceest-fitness:test
          sleep 5
          curl -f http://localhost:5000/ || (docker logs aceest_smoke && exit 1)
          docker stop aceest_smoke
          docker rm aceest_smoke
