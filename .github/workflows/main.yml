name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  lint-and-build:
    name: "Build & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
      - uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8
      - name: Lint
        run: |
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --max-line-length=100 --exit-zero --statistics
      - name: Verify import
        run: python -c "from app import app; print('Import OK')"

  unit-tests:
    name: "Automated Testing (Pytest)"
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
      - uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Pytest
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  docker-build:
    name: "Docker Image Assembly"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3.8.0
      - uses: docker/build-push-action@v6.13.0
        with:
          context: .
          push: false
          tags: aceest-fitness:${{ github.sha }}
      - name: Run Pytest inside container
        run: |
          docker build -t aceest-fitness:test .
          docker run --rm \
            -v ${{ github.workspace }}/tests:/app/tests \
            -v ${{ github.workspace }}/conftest.py:/app/conftest.py \
            --entrypoint "" aceest-fitness:test \
            sh -c "pip install pytest pytest-cov -q && cd /app && pytest tests/ -v --tb=short"
      - name: Smoke test
        run: |
          docker run -d --name aceest_smoke -p 5000:5000 aceest-fitness:test
          sleep 5
          curl -f http://localhost:5000/
          docker stop aceest_smoke
          docker rm aceest_smoke
